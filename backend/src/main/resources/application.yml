spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lidarpro}}"
    driver-class-name: org.postgresql.Driver
    username: "${SPRING_DATASOURCE_USERNAME:${DB_USER:lidarpro}}"
    password: "${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:lidarpro}}"
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 750MB
      max-request-size: 800MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  auth:
    jwt-secret: ${APP_AUTH_JWT_SECRET:}
    access-token-minutes: ${APP_AUTH_ACCESS_TOKEN_MINUTES:120}
    jwt-issuer: ${APP_AUTH_JWT_ISSUER:lidarpro-backend}
    jwt-audience: ${APP_AUTH_JWT_AUDIENCE:lidarpro-mobile-app}
  storage:
    provider: ${APP_STORAGE_PROVIDER:local}
    root-dir: ${APP_STORAGE_ROOT_DIR:./data/models}
    public-base-url: ${APP_STORAGE_PUBLIC_BASE_URL:/api/scans}
    r2-endpoint: ${APP_STORAGE_R2_ENDPOINT:}
    r2-account-id: ${APP_STORAGE_R2_ACCOUNT_ID:}
    r2-bucket: ${APP_STORAGE_R2_BUCKET:}
    r2-access-key-id: ${APP_STORAGE_R2_ACCESS_KEY_ID:}
    r2-secret-access-key: ${APP_STORAGE_R2_SECRET_ACCESS_KEY:}
    r2-region: ${APP_STORAGE_R2_REGION:auto}

server:
  port: ${SERVER_PORT:8080}

